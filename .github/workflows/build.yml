name: Auto-Sign Release APK with Temporary Key

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708
          accept-android-sdk-licenses: 'true'
          # 用 packages 指定需要安装的构建工具和 NDK（原 build-tools-version/ndk-version 已移除）
          packages: 'build-tools;34.0.0 ndk;26.1.10909125'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease

      - name: Generate a temporary keystore
        run: |
          keytool -genkey -v -keystore temp.keystore -alias autokey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass temp123 -keypass temp123 \
            -dname "CN=CI, OU=AutoBuild, O=Temporary, L=City, S=State, C=XX"

      - name: Sign the unsigned APK using apksigner
        run: |
          # 直接使用我们安装的 build-tools 34.0.0 中的 apksigner
          APKSIGNER="${ANDROID_HOME}/build-tools/34.0.0/apksigner"
          if [ ! -f "$APKSIGNER" ]; then
            echo "apksigner not found at expected path, searching..."
            APKSIGNER=$(find ${ANDROID_HOME}/build-tools -name "apksigner" | sort -r | head -1)
          fi
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found, installing build-tools 34.0.0"
            yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "build-tools;34.0.0"
            APKSIGNER="${ANDROID_HOME}/build-tools/34.0.0/apksigner"
          fi

          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -z "$UNSIGNED_APK" ]; then
            echo "No unsigned APK found"
            exit 1
          fi

          echo "Signing $UNSIGNED_APK -> KailLocation.apk"
          $APKSIGNER sign --ks temp.keystore --ks-pass pass:temp123 --key-pass pass:temp123 \
            --v1-signing-enabled true --v2-signing-enabled true \
            --out KailLocation.apk "$UNSIGNED_APK"

      - name: Upload the final signed APK
        uses: actions/upload-artifact@v4
        with:
          name: KailLocation
          path: KailLocation.apk
